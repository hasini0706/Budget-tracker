<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:white;
--text:black;
--card:#f2f2f2;
}
.dark{
--bg:#1e1e1e;
--text:white;
--card:#333;
}

body{
font-family:Arial;
background:var(--bg);
color:var(--text);
margin:0;
padding:20px;
transition:0.3s;
}

.container{
width:900px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
background:var(--bg);
}

.toggle{
text-align:right;
margin-bottom:10px;
}

.tip{
background:#f9e79f;
color:#7d6608;
padding:10px;
border-radius:8px;
margin-bottom:15px;
font-style:italic;
}

.dark .tip{
background:#784212;
color:#f9e79f;
}

.summary{
display:flex;
gap:20px;
margin:20px 0;
}

.card{
padding:10px;
border-radius:10px;
color:white;
width:120px;
text-align:center;
}

.income-card{background:#2ecc71;}
.expense-card{background:#3498db;}

.form-section{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

input, select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:black;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th, td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.income-row{background:#d4f7d4;}
.expense-row{background:#d4e4f7;}

.chart-container{
margin-top:20px;
max-width:400px;
margin-left:auto;
margin-right:auto;
}
@media(max-width:750px){
.container{width:95%;}
.form-section{flex-direction:column;}
}
</style>
</head>
<body>

<div class="container">

<div class="toggle">
<button onclick="toggleMode()">🌙 / ☀ Mode</button>
</div>

<h1>💰 Budget Tracker</h1>

<div class="tip">
💡 Tip: Track your expenses carefully, prioritize needs over wants, and save a portion of your income.
</div>

<h2>Total Balance: ₹<span id="balance">0</span></h2>

<div class="summary">
<div class="card income-card">
Income
<p id="income">₹0</p>
</div>
<div class="card expense-card">
Expense
<p id="expense">₹0</p>
</div>
</div>

<div class="form-section">
<input id="name" placeholder="Transaction Name">
<input id="amount" type="number" placeholder="Amount">
<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>
<button onclick="addTransaction()">Add</button>
</div>

<div class="transaction-section">
<table id="transactionTable">
<thead>
<tr>
<th>Transaction Name</th>
<th>Amount</th>
<th>Type</th>
<th>Delete</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
</div>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

</div>

<script>
let transactions=[];
let chart;

function updateUI(){
let income=0, expense=0, balance=0;

const tbody=document.querySelector("#transactionTable tbody");
tbody.innerHTML="";

let chartLabels=[], chartValues=[], chartColors=[];

transactions.forEach((t,index)=>{
const tr=document.createElement("tr");
tr.className = t.type==="income"?"income-row":"expense-row";
tr.innerHTML=`<td>${t.name}</td>
<td>₹${t.amount}</td>
<td>${t.type}</td>
<td><button onclick="deleteTransaction(${index})">X</button></td>`;
tbody.appendChild(tr);

if(t.type==="income"){income+=t.amount; balance+=t.amount;}
else{expense+=t.amount; balance-=t.amount;}

chartLabels.push(t.name || t.type + (index+1));
chartValues.push(t.amount);
chartColors.push(t.type==="income"?"#2ecc71":"#3498db");
});

document.getElementById("income").innerText="₹"+income;
document.getElementById("expense").innerText="₹"+expense;
document.getElementById("balance").innerText=balance;

updateChart(chartLabels,chartValues,chartColors);
}

function addTransaction(){
const name=document.getElementById("name").value;
const amount=Number(document.getElementById("amount").value);
const type=document.getElementById("type").value;

if(!name || !amount){alert("Enter transaction name and amount"); return;}

transactions.push({name,amount,type});
document.getElementById("name").value="";
document.getElementById("amount").value="";
updateUI();
}

function deleteTransaction(index){
transactions.splice(index,1);
updateUI();
}

function updateChart(labels,values,colors){
const ctx=document.getElementById("chart");
if(chart) chart.destroy();
chart=new Chart(ctx,{
type:'pie',
data:{labels:labels,datasets:[{data:values,backgroundColor:colors,borderWidth:1}]},
options:{plugins:{legend:{position:'bottom'}}}
});
}

function toggleMode(){document.body.classList.toggle("dark");}
updateUI();
</script>

</body>
</html>
